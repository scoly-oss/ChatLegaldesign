services:
  - type: web
    name: chat-legaldesign
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: LEGIFRANCE_CLIENT_ID
        sync: false
      - key: LEGIFRANCE_CLIENT_SECRET
        sync: false
